name: Update Streak Stats
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Explicitly grant write access
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }} # Use your PAT for checkout
          persist-credentials: true # Keeps the PAT for the push step

      - name: Generate streak card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: stats
          options: 'username=${{ github.repository_owner }}&show_icons=true&theme=tokyonight'
          path: profile/streak.svg
          token: ${{ secrets.PAT_TOKEN }} # Use PAT for private repo access

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/streak.svg
          # Only commit if there are changes to avoid errors
          git diff --quiet && git diff --staged --quiet || git commit -m "Update streak stats"
          
          # Force the push using your PAT_TOKEN in the URL
          git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git main
