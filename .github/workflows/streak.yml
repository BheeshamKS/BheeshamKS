name: Update Streak Stats
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - uses: actions/checkout@v4
        with:
          # Use the PAT for the initial checkout so the local repo is authed
          token: ${{ secrets.PAT_TOKEN }}
          persist-credentials: true

      - name: Generate streak card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: stats
          options: 'username=${{ github.repository_owner }}&show_icons=true&theme=tokyonight'
          path: profile/streak.svg
          token: ${{ secrets.PAT_TOKEN }}

      - name: Commit and Push
        env:
          MY_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/streak.svg
          
          # Check if there's actually a change to avoid "nothing to commit" errors
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update streak stats"
            # FORCE PUSH using the token in the URL to bypass 403
            git push https://x-access-token:${MY_TOKEN}@github.com/${{ github.repository }}.git main
          fi
